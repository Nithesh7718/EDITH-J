# EDITH-J application defaults

app.name=EDITH-J
app.system-prompt=/prompts/system-prompt.txt

# Groq defaults. Secrets must come from environment variables.
groq.base-url=https://api.groq.com/openai/v1
groq.model=llama-3.3-70b-versatile
groq.timeout-seconds=30
groq.temperature=0.2

# World Monitor hub defaults. Keep API keys in environment variables.
worldmonitor.base-url=https://www.worldmonitor.app
worldmonitor.api-key=

# Storage defaults.
storage.backend=sqlite
storage.db-path=

# Development-only launcher smoke commands (start work mode demo opens).
edith.dev.smokeLaunchersEnabled=false

# Desktop tool safety toggles.
edith.desktop.fileOpenEnabled=true
edith.desktop.clipboardWriteEnabled=true

# Voice defaults.
# Put the unpacked Vosk model folder at ./models/vosk-model (or override this path
# with EDITHJ_VOSK_MODEL_PATH / -Dedithj.vosk.modelPath).
speech.vosk.model-path=models/vosk-model-small-en-us-0.15
# Optional microphone device name override.
# speech.audio.input-device-name=Microphone Array (AMD Audio Device)
